<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 2rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 {
            margin-bottom: 1rem;
            font-size: 1.5em;
        }

        p {
            color: #aaaaaa;
            font-size: 1.05em;
        }

        .error {
            color: #ff0000;
            margin-top: 2rem;
            padding: 1rem;
            border: 1px solid #ff0000;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Authenticating...</h2>
        <p>Please wait while we complete your sign-in</p>
        <div class="error" id="error"></div>
    </div>

    <script>
        // Get authorization code from URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        if (error) {
            document.getElementById('error').textContent = `Error: ${error}`;
            document.getElementById('error').style.display = 'block';
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        } else if (code) {
            // Store the code temporarily
            sessionStorage.setItem('github_code', code);
            if (state) {
                sessionStorage.setItem('github_state', state);
            }

            // For now, we'll store mock user data
            // In production, you'd send this code to your backend to exchange for a real token
            const mockUser = {
                login: 'github_user',
                avatar_url: 'https://avatars.githubusercontent.com/u/1?v=4',
                id: Math.random().toString(36).substr(2, 9)
            };

            localStorage.setItem('github_token', code);
            localStorage.setItem('github_user', JSON.stringify(mockUser));

            // Redirect back to main page
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        } else {
            document.getElementById('error').textContent = 'No authorization code received';
            document.getElementById('error').style.display = 'block';
            setTimeout(() => {
                window.location.href = '/';
            }, 3000);
        }
    </script>
</body>
</html>
